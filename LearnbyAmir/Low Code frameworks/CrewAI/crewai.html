<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrewAI — From Scratch</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c5cfc;
    --accent2: #00d4aa;
    --accent3: #ff6b6b;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --code-bg: #0d0d15;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    overflow: hidden;
  }

.back-pill {
  position: fixed;
  z-index: 9999;
  top: 12px;
  left: 12px;
  padding: 6px 12px;
  border-radius: 999px;
  background: rgba(15,23,42,0.96);
  border: 1px solid rgba(148,163,255,0.6);
  color: #e5e7eb;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  backdrop-filter: blur(14px);
}

.back-pill span {
  font-size: 14px;
}

@media (min-width: 768px) {
  .back-pill {
    top: 16px;
    left: 20px;
  }
}

  /* SIDEBAR */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    height: 100vh;
    position: sticky;
    top: 0;
  }

  .sidebar-header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .progress-bar {
    margin-top: 16px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  .nav-section {
    padding: 8px 0;
  }

  .nav-section-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    padding: 12px 24px 6px;
    font-family: 'Syne', sans-serif;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 24px;
    cursor: pointer;
    font-size: 13.5px;
    color: var(--muted);
    transition: all 0.15s ease;
    border-left: 2px solid transparent;
    font-weight: 400;
  }

  .nav-item:hover { background: var(--surface2); color: var(--text); }

  .nav-item.active {
    color: var(--accent);
    background: rgba(124,92,252,0.08);
    border-left-color: var(--accent);
    font-weight: 500;
  }

  .nav-item .check {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .nav-item.done .check {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #000;
  }

  .nav-item.active .check { border-color: var(--accent); }

  .nav-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    width: 16px;
    flex-shrink: 0;
  }

  /* MAIN */
  .main {
    flex: 1;
    overflow-y: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .content {
    max-width: 820px;
    padding: 48px 56px 80px;
    width: 100%;
    margin: 0 auto;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .lesson-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .lesson-tag {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  .tag-concept { background: rgba(124,92,252,0.15); color: var(--accent); }
  .tag-code { background: rgba(0,212,170,0.12); color: var(--accent2); }
  .tag-quiz { background: rgba(255,107,107,0.12); color: var(--accent3); }
  .tag-intro { background: rgba(255,200,60,0.12); color: #ffc83c; }

  .lesson-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  h1.lesson-title {
    font-family: 'Syne', sans-serif;
    font-size: 38px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 16px;
  }

  .lesson-subtitle {
    font-size: 17px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 40px;
    font-weight: 300;
    max-width: 600px;
  }

  h2 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    margin: 40px 0 14px;
    letter-spacing: -0.3px;
  }

  h3 {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    margin: 28px 0 10px;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  p { font-size: 15px; line-height: 1.75; color: #c8c8d8; margin-bottom: 16px; }

  strong { color: var(--text); font-weight: 500; }

  /* CODE BLOCKS */
  .code-block {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin: 20px 0;
    overflow: hidden;
  }

  .code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
  }

  .code-lang {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    font-weight: 500;
  }

  .code-copy {
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    transition: color 0.15s;
    background: none;
    border: none;
  }

  .code-copy:hover { color: var(--text); }

  pre {
    padding: 20px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    tab-size: 2;
  }

  .kw { color: #c792ea; }
  .fn { color: #82aaff; }
  .str { color: #c3e88d; }
  .cm { color: #546e7a; font-style: italic; }
  .var { color: #f78c6c; }
  .num { color: #f78c6c; }
  .cls { color: #ffcb6b; }
  .dec { color: #89ddff; }

  /* CALLOUTS */
  .callout {
    border-radius: 10px;
    padding: 18px 22px;
    margin: 22px 0;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    font-size: 14px;
    line-height: 1.65;
  }

  .callout-info { background: rgba(124,92,252,0.1); border: 1px solid rgba(124,92,252,0.25); }
  .callout-tip { background: rgba(0,212,170,0.08); border: 1px solid rgba(0,212,170,0.2); }
  .callout-warn { background: rgba(255,200,60,0.08); border: 1px solid rgba(255,200,60,0.2); }

  .callout-icon { font-size: 18px; line-height: 1; flex-shrink: 0; margin-top: 1px; }
  .callout p { margin: 0; color: var(--text); }

  /* CONCEPT CARDS */
  .concept-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin: 22px 0;
  }

  .concept-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    transition: border-color 0.2s;
  }

  .concept-card:hover { border-color: var(--accent); }

  .concept-card-icon { font-size: 24px; margin-bottom: 10px; }
  .concept-card h4 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .concept-card p { font-size: 13px; margin: 0; color: var(--muted); }

  /* ARCH DIAGRAM */
  .arch-diagram {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin: 24px 0;
    text-align: center;
  }

  .arch-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin: 8px 0;
  }

  .arch-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
  }

  .arch-box.crew { border-color: var(--accent); color: var(--accent); background: rgba(124,92,252,0.08); }
  .arch-box.agent { border-color: var(--accent2); color: var(--accent2); background: rgba(0,212,170,0.08); }
  .arch-box.task { border-color: #ffc83c; color: #ffc83c; background: rgba(255,200,60,0.08); }
  .arch-box.tool { border-color: var(--accent3); color: var(--accent3); background: rgba(255,107,107,0.08); }

  .arch-arrow { color: var(--muted); font-size: 18px; margin: 0 8px; }
  .arch-down { color: var(--muted); font-size: 18px; margin: 0 auto; display: block; }

  /* QUIZ */
  .quiz-container {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin: 28px 0;
  }

  .quiz-q {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 18px;
  }

  .quiz-options { display: flex; flex-direction: column; gap: 10px; }

  .quiz-option {
    padding: 12px 18px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
    background: var(--surface);
    text-align: left;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
  }

  .quiz-option:hover { border-color: var(--accent); background: rgba(124,92,252,0.06); }
  .quiz-option.correct { border-color: var(--accent2); background: rgba(0,212,170,0.1); color: var(--accent2); }
  .quiz-option.wrong { border-color: var(--accent3); background: rgba(255,107,107,0.1); color: var(--accent3); }

  .quiz-feedback {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }

  .quiz-feedback.show { display: block; }
  .quiz-feedback.correct { background: rgba(0,212,170,0.1); color: var(--accent2); border: 1px solid rgba(0,212,170,0.2); }
  .quiz-feedback.wrong { background: rgba(255,107,107,0.1); color: var(--accent3); border: 1px solid rgba(255,107,107,0.2); }

  /* TABLE */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
    font-size: 13.5px;
  }

  th {
    text-align: left;
    padding: 10px 14px;
    background: var(--surface2);
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(42,42,58,0.5);
    color: #c8c8d8;
    vertical-align: top;
  }

  tr:last-child td { border-bottom: none; }

  .badge {
    display: inline-block;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 500;
  }

  .badge-accent { background: rgba(124,92,252,0.15); color: var(--accent); }
  .badge-green { background: rgba(0,212,170,0.12); color: var(--accent2); }

  /* NAV FOOTER */
  .nav-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 56px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
    border: none;
  }

  .nav-btn-prev {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .nav-btn-prev:hover { color: var(--text); }

  .nav-btn-next {
    background: var(--accent);
    color: #fff;
  }

  .nav-btn-next:hover { background: #6a4de8; }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* INLINE CODE */
  code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    background: rgba(124,92,252,0.12);
    color: #c792ea;
    padding: 2px 6px;
    border-radius: 4px;
  }

  ul, ol { padding-left: 22px; margin-bottom: 16px; }
  li { font-size: 15px; line-height: 1.75; color: #c8c8d8; margin-bottom: 4px; }

  /* FLOW DIAGRAM */
  .flow {
    display: flex;
    align-items: center;
    gap: 0;
    flex-wrap: wrap;
    margin: 20px 0;
    padding: 20px;
    background: var(--surface2);
    border-radius: 10px;
    border: 1px solid var(--border);
    justify-content: center;
  }

  .flow-step {
    text-align: center;
    padding: 12px 16px;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
    min-width: 90px;
  }

  .flow-step .fs-icon { font-size: 20px; margin-bottom: 4px; }
  .flow-step .fs-label { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--muted); }
  .flow-arrow { color: var(--accent); font-size: 20px; margin: 0 8px; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

<script>
const lessons = [

// 0 — Intro
{
  tag: 'intro', tagLabel: 'Introduction',
  title: 'What is CrewAI?',
  subtitle: 'A multi-agent framework that lets you orchestrate autonomous AI agents working together as a team — like a real crew.',
  render: () => `
    <p>CrewAI is an open-source Python framework built on top of LangChain for orchestrating <strong>role-playing, autonomous AI agents</strong>. Instead of a single LLM trying to do everything, you assemble a <em>crew</em> of specialized agents — each with its own role, goal, backstory, and tools — that collaborate to complete complex tasks.</p>

    <div class="callout callout-info">
      <span class="callout-icon">💡</span>
      <p><strong>Why CrewAI?</strong> A single LLM has context limits, loses focus, and can't truly parallelize work. CrewAI lets you decompose hard problems into subtasks, assign them to specialists, and combine the results — mirroring how real teams work.</p>
    </div>

    <h2>The Mental Model</h2>
    <p>Think of CrewAI like a <strong>staffing agency for AI</strong>. You define the roles you need, describe what each agent should do, give them relevant tools, and assign them tasks. The <em>Crew</em> manager coordinates who does what and in what order.</p>

    <div class="arch-diagram">
      <div class="arch-row">
        <div class="arch-box crew">Crew (Orchestrator)</div>
      </div>
      <div style="text-align:center;color:var(--muted);font-size:22px;margin:6px 0;">↓</div>
      <div class="arch-row" style="gap:16px;">
        <div class="arch-box agent">Agent: Researcher</div>
        <div class="arch-box agent">Agent: Writer</div>
        <div class="arch-box agent">Agent: Reviewer</div>
      </div>
      <div style="text-align:center;color:var(--muted);font-size:22px;margin:6px 0;">↓</div>
      <div class="arch-row" style="gap:16px;">
        <div class="arch-box task">Task 1</div>
        <div class="arch-box task">Task 2</div>
        <div class="arch-box task">Task 3</div>
      </div>
      <div style="text-align:center;color:var(--muted);font-size:22px;margin:6px 0;">↓</div>
      <div class="arch-row" style="gap:16px;">
        <div class="arch-box tool">Web Search</div>
        <div class="arch-box tool">File Writer</div>
        <div class="arch-box tool">Calculator</div>
      </div>
    </div>

    <h2>CrewAI vs. Other Frameworks</h2>
    <table>
      <thead><tr><th>Framework</th><th>Paradigm</th><th>Best For</th></tr></thead>
      <tbody>
        <tr>
          <td><strong>CrewAI</strong></td>
          <td>Role-based multi-agent teams</td>
          <td>Collaborative workflows, business processes</td>
        </tr>
        <tr>
          <td>LangGraph</td>
          <td>Graph-based state machines</td>
          <td>Fine-grained control flows, loops</td>
        </tr>
        <tr>
          <td>AutoGen</td>
          <td>Conversational multi-agent</td>
          <td>Code execution, dynamic agent chat</td>
        </tr>
        <tr>
          <td>LangChain</td>
          <td>Chain/tool composition</td>
          <td>Single-agent RAG, tool use</td>
        </tr>
      </tbody>
    </table>

    <h2>Key Strengths</h2>
    <div class="concept-grid">
      <div class="concept-card">
        <div class="concept-card-icon">🎭</div>
        <h4>Role-Playing</h4>
        <p>Agents have a role, goal, and backstory — this dramatically improves LLM output quality.</p>
      </div>
      <div class="concept-card">
        <div class="concept-card-icon">🔗</div>
        <h4>Task Chaining</h4>

  render: () => `
    <p>Before writing any code, you need to deeply understand the four building blocks. They map cleanly to real-world teamwork concepts.</p>

    <h2>1. Agent 🤖</h2>
    <p>An <strong>Agent</strong> is an autonomous unit powered by an LLM. It has a <strong>role</strong> (job title), a <strong>goal</strong> (what it's optimizing for), a <strong>backstory</strong> (context that shapes its behavior), and optionally <strong>tools</strong> it can use.</p>

    <div class="callout callout-tip">
      <span class="callout-icon">✅</span>
      <p>The <strong>backstory</strong> is surprisingly powerful. It's essentially a system prompt that gets injected into every LLM call for that agent. Writing a rich backstory consistently improves output quality.</p>
    </div>

    <table>
      <thead><tr><th>Property</th><th>Type</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>role</code></td><td>str</td><td>The agent's job title (e.g., "Senior Data Analyst")</td></tr>
        <tr><td><code>goal</code></td><td>str</td><td>What the agent is trying to accomplish</td></tr>
        <tr><td><code>backstory</code></td><td>str</td><td>Rich context about the agent's expertise and perspective</td></tr>
        <tr><td><code>llm</code></td><td>LLM</td><td>The language model powering this agent (defaults to GPT-4)</td></tr>
        <tr><td><code>tools</code></td><td>list</td><td>Tools available to this agent</td></tr>
        <tr><td><code>verbose</code></td><td>bool</td><td>Print agent's reasoning to console</td></tr>
        <tr><td><code>memory</code></td><td>bool</td><td>Enable long-term memory for this agent</td></tr>
        <tr><td><code>allow_delegation</code></td><td>bool</td><td>Can delegate tasks to other agents</td></tr>
      </tbody>
    </table>

    <h2>2. Task 📋</h2>
    <p>A <strong>Task</strong> is a specific piece of work to be done. It has a <strong>description</strong> (what to do), an <strong>expected_output</strong> (what a good result looks like), and is assigned to a specific agent.</p>

    <div class="callout callout-warn">
      <span class="callout-icon">⚠️</span>
      <p>The <code>expected_output</code> field is critical — it tells the LLM exactly what format and quality of output you need. Vague descriptions lead to vague outputs.</p>
    </div>

    <table>
      <thead><tr><th>Property</th><th>Type</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>description</code></td><td>str</td><td>Detailed instructions for what to accomplish</td></tr>
        <tr><td><code>expected_output</code></td><td>str</td><td>What the output should look like</td></tr>
        <tr><td><code>agent</code></td><td>Agent</td><td>Which agent executes this task</td></tr>
        <tr><td><code>tools</code></td><td>list</td><td>Override agent tools for this specific task</td></tr>
        <tr><td><code>context</code></td><td>list[Task]</td><td>Tasks whose output feeds into this task</td></tr>
        <tr><td><code>output_file</code></td><td>str</td><td>Save output to this file path</td></tr>
        <tr><td><code>output_pydantic</code></td><td>BaseModel</td><td>Force structured Pydantic output</td></tr>
      </tbody>
    </table>

    <h2>3. Tool 🔧</h2>
    <p>A <strong>Tool</strong> is a function an agent can call to interact with the outside world — search the web, read files, run Python, query a database. CrewAI supports all LangChain tools plus custom tools via the <code>@tool</code> decorator.</p>

    <h2>4. Crew 👥</h2>
    <p>The <strong>Crew</strong> is the orchestrator. It holds the list of agents and tasks, defines the execution <strong>process</strong> (sequential or hierarchical), and calls <code>crew.kickoff()</code> to start everything running.</p>

      <div class="flow-arrow">→</div>
      <div class="flow-step"><div class="fs-icon">📋</div><div class="fs-label">Task 2</div></div>
      <div class="flow-arrow">→</div>
      <div class="flow-step"><div class="fs-icon">✅</div><div class="fs-label">Result</div></div>

    <div class="quiz-container">
      <div class="quiz-q">Quick Check: What property on Task lets you pass the output of a previous task as context?</div>

let current = 0;
let completed = new Set();

function goTo(n) {
  // Mark current as done
  completed.add(current);
  current = n;
  renderLesson();
  updateNav();
  document.querySelector('.main').scrollTop = 0;
}

function renderLesson() {
  const l = lessons[current];
  const tagClass = { intro: 'tag-intro', concept: 'tag-concept', code: 'tag-code', quiz: 'tag-quiz' }[l.tag] || 'tag-concept';
  
  document.getElementById('lessonContent').innerHTML = `
    <div class="lesson-meta">
      <span class="lesson-tag ${tagClass}">${l.tagLabel}</span>
      <span class="lesson-num">Lesson ${String(current + 1).padStart(2, '0')} of ${lessons.length}</span>
    </div>
    <h1 class="lesson-title">${l.title}</h1>
    <p class="lesson-subtitle">${l.subtitle}</p>
    ${l.render()}
    <div class="nav-footer">
      <button class="nav-btn nav-btn-prev" onclick="goTo(${current - 1})" ${current === 0 ? 'disabled' : ''}>
        ← Previous
      </button>
      <span style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace">${current + 1} / ${lessons.length}</span>
      <button class="nav-btn nav-btn-next" onclick="goTo(${current + 1})" ${current === lessons.length - 1 ? 'disabled' : ''}>
        Next →
      </button>
    </div>
  `;
}

function updateNav() {
  document.querySelectorAll('.nav-item').forEach((el, i) => {
    el.classList.remove('active', 'done');
    if (i === current) el.classList.add('active');
    else if (completed.has(i)) {
      el.classList.add('done');
      document.getElementById('chk' + i).textContent = '✓';
    }
  });
  const pct = Math.round((completed.size / lessons.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${completed.size} / ${lessons.length} complete`;
}

function answer(btn, correct) {
  const opts = btn.closest('.quiz-options').querySelectorAll('.quiz-option');
  opts.forEach(o => o.disabled = true);
  btn.classList.add(correct ? 'correct' : 'wrong');
  const fb = document.getElementById('qfeedback');
  if (fb) {
    fb.classList.add('show', correct ? 'correct' : 'wrong');
    if (!correct) fb.textContent = '❌ Not quite. The correct answer is the second option — context=[task1, task2].';
  }
}

function copyCode(btn) {
  const pre = btn.closest('.code-block').querySelector('pre');
  navigator.clipboard.writeText(pre.innerText).then(() => {
    btn.textContent = 'copied!';
    setTimeout(() => btn.textContent = 'copy', 1500);
  });
}

// Init
renderLesson();
updateNav();
</script>
</body>
