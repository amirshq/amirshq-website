
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-sans, 'Inter', sans-serif); overflow: hidden; }

    .mindmap-wrapper {
      background: transparent;
      padding: 0;
    }

    #canvas-wrap {
      width: 100%; height: 780px; position: relative; overflow: hidden;
      background: linear-gradient(135deg, #0d1117 0%, #0f1b2d 40%, #111827 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      cursor: grab;
      user-select: none;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    #canvas-wrap:active { cursor: grabbing; }
    #canvas-wrap::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(24,95,165,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(83,74,183,0.10) 0%, transparent 60%);
      pointer-events: none;
      border-radius: 16px;
    }
    #mindmap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    .controls {
      display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap;
    }
    .ctrl-btn {
      font-size: 12px; padding: 6px 14px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7);
      cursor: pointer; font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      backdrop-filter: blur(6px);
      letter-spacing: 0.01em;
    }
    .ctrl-btn:hover {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.95);
      border-color: rgba(255,255,255,0.22);
    }
    .hint {
      font-size: 11px; color: rgba(255,255,255,0.32); margin-left: auto;
      letter-spacing: 0.02em;
    }

    .tooltip {
      position: absolute; pointer-events: none; z-index: 20;
      background: rgba(15, 20, 30, 0.92);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 10px 14px;
      font-size: 12px; color: rgba(255,255,255,0.65);
      max-width: 240px; line-height: 1.6;
      opacity: 0; transition: opacity 0.15s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }
    .tooltip.show { opacity: 1; }
    .tooltip strong {
      color: rgba(255,255,255,0.9); font-weight: 500;
      display: block; margin-bottom: 4px; font-size: 12.5px;
    }
</style>

<div class="mindmap-wrapper">
  <div class="controls">
    <button class="ctrl-btn" onclick="zoom(1.2)">+ Zoom in</button>
    <button class="ctrl-btn" onclick="zoom(0.83)">− Zoom out</button>
    <button class="ctrl-btn" onclick="resetView()">Reset view</button>
    <button class="ctrl-btn" onclick="toggleAll()">Expand / collapse all</button>
    <span class="hint">Click node to expand · Drag to pan · Hover for details</span>
  </div>

  <div id="canvas-wrap">
    <svg id="mindmap" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow-blue" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-purple" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="3.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="node-shadow" x="-30%" y="-30%" width="160%" height="160%">
          <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.45)"/>
        </filter>
        <filter id="node-shadow-root" x="-30%" y="-30%" width="160%" height="160%">
          <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="rgba(24,95,165,0.5)"/>
        </filter>
      </defs>
    </svg>
    <div class="tooltip" id="tip"></div>
  </div>
</div>

const svg = document.getElementById('mindmap');
const tip = document.getElementById('tip');
const wrap = document.getElementById('canvas-wrap');

let W = wrap.clientWidth, H = wrap.clientHeight;
let tx = W/2, ty = H/2, scale = 1;
let allExpanded = false;

const collapsed = new Set();
const positions = {};
let edges = [];
let nodes = [];

// Node sizes — larger, more readable
const RX = { root:68, l1:58, ai:46, compute:46, data:46, network:46, security:46, devops:46, iot:46, mixed:44 };
const RY = { root:26, l1:22, ai:18, compute:18, data:18, network:18, security:18, devops:18, iot:18, mixed:18 };
const FS = { root:14, l1:13, ai:12, compute:12, data:12, network:12, security:12, devops:12, iot:12, mixed:12 };

function layout() {
  nodes = []; edges = [];
  const cx = 0, cy = 0;
  positions['root'] = { x:cx, y:cy };
  nodes.push({ node: data, x:cx, y:cy });

  const L1 = data.children;
  const L1count = L1.length;
  const L1r = 310; // more spacing

  L1.forEach((l1node, i) => {
    if (collapsed.has('root')) return;
    const angle = (2*Math.PI / L1count) * i - Math.PI/2;
    const x = cx + Math.cos(angle) * L1r;
    const y = cy + Math.sin(angle) * L1r;
    positions[l1node.id] = {x, y};
    nodes.push({node:l1node, x, y});
    edges.push({x1:cx, y1:cy, x2:x, y2:y, color:l1node.color});

    const L2 = l1node.children;
    if (!L2 || !L2.length || collapsed.has(l1node.id)) return;

    const spread = Math.min(Math.PI * 0.75, (L2.length-1) * 0.28);
    const baseAngle = angle;
    const L2r = 175 + Math.min(L2.length * 6, 55); // more spacing

    L2.forEach((l2node, j) => {
      const off = L2.length === 1 ? 0 : (j / (L2.length-1) - 0.5) * spread;
      const a2 = baseAngle + off;
      const x2 = x + Math.cos(a2) * L2r;
      const y2 = y + Math.sin(a2) * L2r;
      positions[l2node.id] = {x:x2, y:y2};
      nodes.push({node:l2node, x:x2, y:y2});
      edges.push({x1:x, y1:y, x2:x2, y2:y2, color:l2node.color});

      const L3 = l2node.children;
      if (!L3 || !L3.length || collapsed.has(l2node.id)) return;
      const spread3 = Math.min(Math.PI*0.5, (L3.length-1)*0.22);
      const L3r = 130; // more spacing

      L3.forEach((l3node, k) => {
        const off3 = L3.length===1 ? 0 : (k/(L3.length-1)-0.5)*spread3;
        const a3 = a2 + off3;
        const x3 = x2 + Math.cos(a3)*L3r;
        const y3 = y2 + Math.sin(a3)*L3r;
        positions[l3node.id] = {x:x3, y:y3};
        nodes.push({node:l3node, x:x3, y:y3});
        edges.push({x1:x2, y1:y2, x2:x3, y2:y3, color:l3node.color});
      });
    });
  });
}

function colorFor(c) { return COLORS[c] || COLORS.mixed; }

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function render() {
  layout();
  while(svg.firstChild) {
    if (svg.firstChild.tagName === 'defs') { svg.removeChild(svg.lastChild); break; }
    svg.removeChild(svg.firstChild);
  }
  // Rebuild keeping defs
  while(svg.children.length > 1) svg.removeChild(svg.lastChild);

  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('id','scene');
  g.setAttribute('transform', `translate(${tx},${ty}) scale(${scale})`);
  svg.appendChild(g);

  // Draw edges with gradient-like opacity
  edges.forEach(e => {
    const col = colorFor(e.color);
    const dx = e.x2 - e.x1, dy = e.y2 - e.y1;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const mx = (e.x1+e.x2)/2 + (-dy/dist)*20;
    const my = (e.y1+e.y2)/2 + (dx/dist)*20;

    // Glow line
    const glow = document.createElementNS('http://www.w3.org/2000/svg','path');
    glow.setAttribute('d', `M${e.x1},${e.y1} Q${mx},${my} ${e.x2},${e.y2}`);
    glow.setAttribute('fill','none');
    glow.setAttribute('stroke', col.stroke);
    glow.setAttribute('stroke-width','3');
    glow.setAttribute('opacity','0.12');
    g.appendChild(glow);

    // Main line
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M${e.x1},${e.y1} Q${mx},${my} ${e.x2},${e.y2}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke', col.stroke);
    path.setAttribute('stroke-width','1.5');
    path.setAttribute('opacity','0.5');
    g.appendChild(path);
  });

  nodes.forEach(({node, x, y}) => {
    const col = colorFor(node.color);
    const rx = RX[node.color] || 44;
    const ry = RY[node.color] || 18;
    const fs = FS[node.color] || 12;
    const hasC = node.children && node.children.length > 0;
    const isCollapsed = collapsed.has(node.id);
    const isRoot = node.color === 'root';

    const grp = document.createElementNS('http://www.w3.org/2000/svg','g');
    grp.style.cursor = hasC ? 'pointer' : 'default';

    // Outer glow ellipse
    const glowEll = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
    glowEll.setAttribute('cx', x); glowEll.setAttribute('cy', y);
    glowEll.setAttribute('rx', rx + 6); glowEll.setAttribute('ry', ry + 6);
    glowEll.setAttribute('fill', col.glow || 'rgba(255,255,255,0.05)');
    glowEll.setAttribute('opacity','0');
    glowEll.setAttribute('class', 'node-glow');
    grp.appendChild(glowEll);

    // Main ellipse with subtle gradient-like look via inner shadow
    const ell = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
    ell.setAttribute('cx', x); ell.setAttribute('cy', y);
    ell.setAttribute('rx', rx); ell.setAttribute('ry', ry);
    ell.setAttribute('fill', col.fill);
    ell.setAttribute('stroke', col.stroke);
    ell.setAttribute('stroke-width', isRoot ? '2.5' : '1.5');
    ell.setAttribute('filter', isRoot ? 'url(#node-shadow-root)' : 'url(#node-shadow)');
    grp.appendChild(ell);

    // Highlight arc on top for depth
    const hi = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
    hi.setAttribute('cx', x); hi.setAttribute('cy', y - ry*0.22);
    hi.setAttribute('rx', rx * 0.7); hi.setAttribute('ry', ry * 0.38);
    hi.setAttribute('fill', 'rgba(255,255,255,0.08)');
    hi.setAttribute('pointer-events','none');
    grp.appendChild(hi);

    const label = node.label.length > 18 ? node.label.replace(' ', '\n') : node.label;
    const lines = label.split('\n');
    lines.forEach((line, i) => {
      const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x', x);
      txt.setAttribute('y', y + (i - (lines.length-1)/2) * (fs + 3));
      txt.setAttribute('text-anchor','middle');
      txt.setAttribute('dominant-baseline','central');
      txt.setAttribute('fill', col.text);
      txt.setAttribute('font-size', fs);
      txt.setAttribute('font-family', 'var(--font-sans, Inter, sans-serif)');
      txt.setAttribute('font-weight', isRoot ? '600' : '500');
      txt.setAttribute('letter-spacing', isRoot ? '0.3' : '0.1');
      txt.setAttribute('pointer-events','none');
      txt.textContent = line;
      grp.appendChild(txt);
    });

    if (hasC) {
      const dotR = 6;
      const dotX = x + rx - 2;
      const dotY = y - ry + 2;

      const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx', dotX); dot.setAttribute('cy', dotY);
      dot.setAttribute('r', dotR);
      dot.setAttribute('fill', isCollapsed ? col.stroke : 'rgba(255,255,255,0.15)');
      dot.setAttribute('stroke', col.stroke);
      dot.setAttribute('stroke-width','1.5');
      grp.appendChild(dot);

      const sym = document.createElementNS('http://www.w3.org/2000/svg','text');
      sym.setAttribute('x', dotX); sym.setAttribute('y', dotY);
      sym.setAttribute('text-anchor','middle');
      sym.setAttribute('dominant-baseline','central');
      sym.setAttribute('fill', isCollapsed ? '#fff' : col.text);
      sym.setAttribute('font-size', '8');
      sym.setAttribute('font-weight', '700');
      sym.setAttribute('pointer-events','none');
      sym.textContent = isCollapsed ? '+' : '−';
      grp.appendChild(sym);
    }

    grp.addEventListener('click', (e) => {
      e.stopPropagation();
      if (hasC) {
        if (collapsed.has(node.id)) collapsed.delete(node.id);
        else collapsed.add(node.id);
        render();
      }
    });

    grp.addEventListener('mouseenter', (e) => {
      tip.innerHTML = `<strong>${node.label}</strong>${node.tip}`;
      tip.classList.add('show');
      ell.setAttribute('stroke-width', isRoot ? '3' : '2');
      ell.setAttribute('opacity','0.88');
      glowEll.setAttribute('opacity','0.5');
    });
    grp.addEventListener('mousemove', (e) => {
      const rect = wrap.getBoundingClientRect();
      let lx = e.clientX - rect.left + 16;
      let ly = e.clientY - rect.top + 16;
      if (lx + 250 > W) lx -= 260;
      if (ly + 90 > H) ly -= 90;
      tip.style.left = lx + 'px';
      tip.style.top = ly + 'px';
    });
    grp.addEventListener('mouseleave', () => {
      tip.classList.remove('show');
      ell.setAttribute('stroke-width', isRoot ? '2.5' : '1.5');
      ell.setAttribute('opacity','1');
      glowEll.setAttribute('opacity','0');
    });

    g.appendChild(grp);
  });
}

function zoom(f) {
  scale = Math.max(0.25, Math.min(3, scale * f));
  render();
}

function resetView() {
  tx = W/2; ty = H/2; scale = 1;
  render();
}

function toggleAll() {
  if (allExpanded) {
    data.children.forEach(c => {
      collapsed.add(c.id);
      if (c.children) c.children.forEach(cc => collapsed.add(cc.id));
    });
    allExpanded = false;
  } else {
    collapsed.clear();
    allExpanded = true;
  }
  render();
}

let drag = false, lastX = 0, lastY = 0;
wrap.addEventListener('mousedown', e => { drag=true; lastX=e.clientX; lastY=e.clientY; });
window.addEventListener('mousemove', e => {
  if (!drag) return;
  tx += e.clientX - lastX; ty += e.clientY - lastY;
  lastX=e.clientX; lastY=e.clientY;
  render();
});
window.addEventListener('mouseup', () => { drag=false; });

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  zoom(e.deltaY < 0 ? 1.1 : 0.91);
}, {passive:false});

wrap.addEventListener('touchstart', e => {
  if (e.touches.length===1) { drag=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; }
}, {passive:true});
wrap.addEventListener('touchmove', e => {
  if (!drag || e.touches.length!==1) return;
  tx += e.touches[0].clientX - lastX; ty += e.touches[0].clientY - lastY;
  lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  render();
}, {passive:true});
wrap.addEventListener('touchend', () => { drag=false; });

// Start with L1 visible, L2+ collapsed
data.children.forEach(c => {
  if (c.children) c.children.forEach(cc => collapsed.add(cc.id));
});

W = wrap.clientWidth; H = wrap.clientHeight;
tx = W/2; ty = H/2;
render();
</script>
