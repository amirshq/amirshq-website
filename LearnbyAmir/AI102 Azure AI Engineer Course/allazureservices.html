
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-sans, 'Inter', sans-serif); overflow: hidden; }

    #canvas-wrap {
      width: 100%; height: 780px; position: relative; overflow: hidden;
      background: linear-gradient(135deg, #0d1117 0%, #0f1b2d 40%, #111827 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      cursor: grab;
      user-select: none;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    #canvas-wrap:active { cursor: grabbing; }
    #canvas-wrap::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(24,95,165,0.10) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(83,74,183,0.08) 0%, transparent 60%);
      pointer-events: none;
      border-radius: 16px;
    }
    #mindmap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    .controls {
      display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap;
    }
    .ctrl-btn {
      font-size: 12px; padding: 6px 14px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7);
      cursor: pointer; font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      backdrop-filter: blur(6px);
      letter-spacing: 0.01em;
    }
    .ctrl-btn:hover {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.95);
      border-color: rgba(255,255,255,0.22);
    }
    .hint { font-size: 11px; color: rgba(255,255,255,0.32); margin-left: auto; letter-spacing: 0.02em; }

    .tooltip {
      position: absolute; pointer-events: none; z-index: 20;
      background: rgba(15, 20, 30, 0.94);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 10px 14px;
      font-size: 12px; color: rgba(255,255,255,0.65);
      max-width: 240px; line-height: 1.6;
      opacity: 0; transition: opacity 0.15s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }
    .tooltip.show { opacity: 1; }
    .tooltip strong { color: rgba(255,255,255,0.9); font-weight: 500; display: block; margin-bottom: 4px; font-size: 12.5px; }
</style>

<div class="controls">
  <button class="ctrl-btn" onclick="zoom(1.2)">+ Zoom in</button>
  <button class="ctrl-btn" onclick="zoom(0.83)">− Zoom out</button>
  <button class="ctrl-btn" onclick="resetView()">Reset view</button>
  <button class="ctrl-btn" onclick="toggleAll()">Expand / collapse all</button>
  <span class="hint">Click node to expand · Drag to pan · Hover for details</span>
</div>

<div id="canvas-wrap">
  <svg id="mindmap" xmlns="http://www.w3.org/2000/svg"></svg>
  <div class="tooltip" id="tip"></div>
</div>

<script>

      children:[
        { id:'azure-devops', label:'Azure DevOps', color:'devops', tip:'Boards, Repos, Pipelines, Artifacts, Test Plans. End-to-end ALM including AI CI/CD.', children:[] },
        { id:'github-actions', label:'GitHub Actions', color:'devops', tip:'CI/CD workflows triggered by GitHub events. Deploy ARM, Bicep, or SDK-based AI resources.', children:[] },
        { id:'monitor', label:'Azure Monitor', color:'devops', tip:'Metrics, logs, alerts for all Azure resources. Log Analytics (KQL), Application Insights.', children:[] },
        { id:'app-insights', label:'App Insights', color:'devops', tip:'APM — traces, exceptions, performance. Integrates with OpenTelemetry for LLM tracing.', children:[] },

      ]

    {
      id:'iot-edge', label:'IoT & Edge', color:'iot', tip:'Services for connected devices and edge AI deployments.',
      children:[
        { id:'iot-hub', label:'IoT Hub', color:'iot', tip:'Bi-directional messaging between IoT devices and cloud. Device registry, routing, monitoring.', children:[] },
        { id:'iot-edge-svc', label:'IoT Edge', color:'iot', tip:'Run AI models and Azure services on edge devices. Deploy AI containers to field devices.', children:[] },

const svg = document.getElementById('mindmap');
const tip = document.getElementById('tip');
const wrap = document.getElementById('canvas-wrap');

let W = wrap.clientWidth, H = wrap.clientHeight;
let tx = W/2, ty = H/2, scale = 1;
let allExpanded = false;
const collapsed = new Set();
let edges = [], nodes = [];

// Node half-widths and half-heights (for rect sizing)
const NW = { root:72, foundry:62, openai:62, compute:62, data:62, network:62, security:62, devops:62, iot:62, ai:58, mixed:58 };
const NH = { root:22, foundry:18, openai:18, compute:18, data:18, network:18, security:18, devops:18, iot:18, ai:16, mixed:16 };
const FS = { root:13, foundry:12, openai:12, compute:12, data:12, network:12, security:12, devops:12, iot:12, ai:11, mixed:11 };
const CORNER = 8; // border-radius for rect nodes

function layout() {
  nodes = []; edges = [];
  nodes.push({ node: data, x:0, y:0 });

  const L1 = data.children;
  const L1r = 320;

  L1.forEach((l1node, i) => {
    if (collapsed.has('root')) return;
    const angle = (2*Math.PI / L1.length) * i - Math.PI/2;
    const x = Math.cos(angle) * L1r;
    const y = Math.sin(angle) * L1r;
    nodes.push({node:l1node, x, y});
    edges.push({x1:0, y1:0, x2:x, y2:y, color:l1node.color});

    const L2 = l1node.children;
    if (!L2 || !L2.length || collapsed.has(l1node.id)) return;

    const spread = Math.min(Math.PI * 0.72, (L2.length - 1) * 0.27);
    const L2r = 185 + Math.min(L2.length * 5, 50);

    L2.forEach((l2node, j) => {
      const off = L2.length === 1 ? 0 : (j / (L2.length - 1) - 0.5) * spread;
      const a2 = angle + off;
      const x2 = x + Math.cos(a2) * L2r;
      const y2 = y + Math.sin(a2) * L2r;
      nodes.push({node:l2node, x:x2, y:y2});
      edges.push({x1:x, y1:y, x2:x2, y2:y2, color:l2node.color});

      const L3 = l2node.children;
      if (!L3 || !L3.length || collapsed.has(l2node.id)) return;
      const spread3 = Math.min(Math.PI * 0.5, (L3.length - 1) * 0.22);
      const L3r = 135;

      L3.forEach((l3node, k) => {
        const off3 = L3.length === 1 ? 0 : (k / (L3.length - 1) - 0.5) * spread3;
        const a3 = a2 + off3;
        const x3 = x2 + Math.cos(a3) * L3r;
        const y3 = y2 + Math.sin(a3) * L3r;
        nodes.push({node:l3node, x:x3, y:y3});
        edges.push({x1:x2, y1:y2, x2:x3, y2:y3, color:l3node.color});
      });
    });
  });
}

function colorFor(c) { return COLORS[c] || COLORS.mixed; }

function makeSVGDefs() {
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML = `
    <filter id="f-shadow" x="-25%" y="-40%" width="150%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <filter id="f-root" x="-30%" y="-60%" width="160%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="rgba(66,165,245,0.45)"/>
    </filter>
  `;
  return defs;
}

function render() {
  layout();
  // Clear and rebuild SVG from scratch each render
  svg.innerHTML = '';
  svg.appendChild(makeSVGDefs());

  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('transform', `translate(${tx},${ty}) scale(${scale})`);
  svg.appendChild(g);

  // Edges
  edges.forEach(e => {
    const col = colorFor(e.color);
    const dx = e.x2 - e.x1, dy = e.y2 - e.y1;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    // Slight perpendicular curve
    const mx = (e.x1+e.x2)/2 + (-dy/dist)*15;
    const my = (e.y1+e.y2)/2 + (dx/dist)*15;
    const d = `M${e.x1},${e.y1} Q${mx},${my} ${e.x2},${e.y2}`;

    // Glow
    const pg = document.createElementNS('http://www.w3.org/2000/svg','path');
    pg.setAttribute('d', d); pg.setAttribute('fill','none');
    pg.setAttribute('stroke', col.stroke); pg.setAttribute('stroke-width','4');
    pg.setAttribute('opacity','0.10');
    g.appendChild(pg);

    // Line
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', d); p.setAttribute('fill','none');
    p.setAttribute('stroke', col.stroke); p.setAttribute('stroke-width','1.5');
    p.setAttribute('opacity','0.55');
    g.appendChild(p);
  });

  // Nodes
  nodes.forEach(({node, x, y}) => {
    const col = colorFor(node.color);
    const hw = NW[node.color] || 58;   // half-width
    const hh = NH[node.color] || 16;   // half-height
    const fs = FS[node.color] || 11;
    const hasC = node.children && node.children.length > 0;
    const isCollapsed = collapsed.has(node.id);
    const isRoot = node.color === 'root';

    const grp = document.createElementNS('http://www.w3.org/2000/svg','g');
    grp.style.cursor = hasC ? 'pointer' : 'default';

    // Outer glow rect (shown on hover)
    const glowRect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    glowRect.setAttribute('x', x - hw - 5); glowRect.setAttribute('y', y - hh - 5);
    glowRect.setAttribute('width', (hw+5)*2); glowRect.setAttribute('height', (hh+5)*2);
    glowRect.setAttribute('rx', CORNER + 4); glowRect.setAttribute('ry', CORNER + 4);
    glowRect.setAttribute('fill', col.stroke); glowRect.setAttribute('opacity','0');
    grp.appendChild(glowRect);

    // Main rect
    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x', x - hw); rect.setAttribute('y', y - hh);
    rect.setAttribute('width', hw*2); rect.setAttribute('height', hh*2);
    rect.setAttribute('rx', CORNER); rect.setAttribute('ry', CORNER);
    rect.setAttribute('fill', col.fill);
    rect.setAttribute('stroke', col.stroke);
    rect.setAttribute('stroke-width', isRoot ? '2.5' : '1.5');
    rect.setAttribute('filter', isRoot ? 'url(#f-root)' : 'url(#f-shadow)');
    grp.appendChild(rect);

    // Top highlight strip
    const hi = document.createElementNS('http://www.w3.org/2000/svg','rect');
    hi.setAttribute('x', x - hw + 2); hi.setAttribute('y', y - hh + 2);
    hi.setAttribute('width', (hw-2)*2); hi.setAttribute('height', hh * 0.45);
    hi.setAttribute('rx', CORNER - 1); hi.setAttribute('ry', CORNER - 1);
    hi.setAttribute('fill', 'rgba(255,255,255,0.07)');
    hi.setAttribute('pointer-events','none');
    grp.appendChild(hi);

    // Label text (split long labels)
    const rawLabel = node.label;
    let lines;
    if (rawLabel.length > 17) {
      // Split at last space before midpoint
      const mid = Math.floor(rawLabel.length / 2);
      const sp = rawLabel.lastIndexOf(' ', mid + 4);
      lines = sp > 0 ? [rawLabel.slice(0,sp), rawLabel.slice(sp+1)] : [rawLabel];
    } else {
      lines = [rawLabel];
    }

    lines.forEach((line, i) => {
      const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x', x);
      txt.setAttribute('y', y + (i - (lines.length-1)/2) * (fs + 2.5));
      txt.setAttribute('text-anchor','middle');
      txt.setAttribute('dominant-baseline','central');
      txt.setAttribute('fill', col.text);
      txt.setAttribute('font-size', fs);
      txt.setAttribute('font-family', 'var(--font-sans, Inter, system-ui, sans-serif)');
      txt.setAttribute('font-weight', isRoot ? '600' : '500');
      txt.setAttribute('pointer-events','none');
      txt.textContent = line;
      grp.appendChild(txt);
    });

    // Expand/collapse badge
    if (hasC) {
      const bx = x + hw - 9, by = y - hh + 9;
      const badge = document.createElementNS('http://www.w3.org/2000/svg','circle');
      badge.setAttribute('cx', bx); badge.setAttribute('cy', by);
      badge.setAttribute('r','7');
      badge.setAttribute('fill', isCollapsed ? col.stroke : 'rgba(255,255,255,0.15)');
      badge.setAttribute('stroke', col.stroke);
      badge.setAttribute('stroke-width','1.5');
      grp.appendChild(badge);

      const sym = document.createElementNS('http://www.w3.org/2000/svg','text');
      sym.setAttribute('x', bx); sym.setAttribute('y', by);
      sym.setAttribute('text-anchor','middle'); sym.setAttribute('dominant-baseline','central');
      sym.setAttribute('fill', isCollapsed ? '#fff' : col.text);
      sym.setAttribute('font-size','9'); sym.setAttribute('font-weight','700');
      sym.setAttribute('pointer-events','none');
      sym.textContent = isCollapsed ? '+' : '−';
      grp.appendChild(sym);
    }

    grp.addEventListener('click', e => {
      e.stopPropagation();
      if (hasC) {
        if (collapsed.has(node.id)) collapsed.delete(node.id);
        else collapsed.add(node.id);
        render();
      }
    });

    grp.addEventListener('mouseenter', () => {
      tip.innerHTML = `<strong>${node.label}</strong>${node.tip}`;
      tip.classList.add('show');
      glowRect.setAttribute('opacity','0.18');
      rect.setAttribute('stroke-width', isRoot ? '3' : '2.5');
    });
    grp.addEventListener('mousemove', e => {
      const r = wrap.getBoundingClientRect();
      let lx = e.clientX - r.left + 16;
      let ly = e.clientY - r.top + 16;
      if (lx + 255 > W) lx -= 265;
      if (ly + 90 > H) ly -= 90;
      tip.style.left = lx + 'px'; tip.style.top = ly + 'px';
    });
    grp.addEventListener('mouseleave', () => {
      tip.classList.remove('show');
      glowRect.setAttribute('opacity','0');
      rect.setAttribute('stroke-width', isRoot ? '2.5' : '1.5');
    });

    g.appendChild(grp);
  });
}

function zoom(f) { scale = Math.max(0.25, Math.min(3, scale*f)); render(); }
function resetView() { tx = W/2; ty = H/2; scale = 1; render(); }
function toggleAll() {
  if (allExpanded) {
    data.children.forEach(c => {
      collapsed.add(c.id);
      if (c.children) c.children.forEach(cc => collapsed.add(cc.id));
    });
    allExpanded = false;
  } else {
    collapsed.clear();
    allExpanded = true;
  }
  render();
}

let drag = false, lastX = 0, lastY = 0;
wrap.addEventListener('mousedown', e => { drag=true; lastX=e.clientX; lastY=e.clientY; });
window.addEventListener('mousemove', e => {
  if (!drag) return;
  tx += e.clientX - lastX; ty += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  render();
});
window.addEventListener('mouseup', () => { drag = false; });
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  zoom(e.deltaY < 0 ? 1.1 : 0.91);
}, {passive:false});
wrap.addEventListener('touchstart', e => {
  if (e.touches.length===1) { drag=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; }
}, {passive:true});
wrap.addEventListener('touchmove', e => {
  if (!drag || e.touches.length!==1) return;
  tx += e.touches[0].clientX - lastX; ty += e.touches[0].clientY - lastY;
  lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  render();
}, {passive:true});
wrap.addEventListener('touchend', () => { drag = false; });

// Start with L1 visible, L2+ collapsed
data.children.forEach(c => {
  if (c.children) c.children.forEach(cc => collapsed.add(cc.id));
});

W = wrap.clientWidth; H = wrap.clientHeight;
tx = W/2; ty = H/2;
render();
</script>
