  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --page-bg: #0e1117;
      --card-bg: #161b26;
      --border-subtle: rgba(255,255,255,0.09);
      --border-strong: rgba(94,234,212,0.25);

      --font-display: 'Syne', sans-serif;

    }

    html { scroll-behavior: smooth; }

    body {

      background-color: var(--page-bg);
      background-image: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(30, 20, 60, 0.4) 0%, transparent 60%);
      background-repeat: no-repeat;
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-layer {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .bg-layer::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(circle at top left, rgba(45,212,191,0.12) 0, transparent 55%),
        radial-gradient(circle at bottom right, rgba(15,23,42,0.9) 0, transparent 70%);
      opacity: 0.7;

    .site-wrap {

      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 20px 72px;
    }

      align-items: center;

    .nav-left {

      gap: 6px;
    }
    .nav-logo {
      font-family: var(--font-display);

      font-weight: 800;

      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }
    .nav-sub {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text-muted);
    }
    .nav-link-back {
      font-size: 12px;
      color: var(--text-secondary);
      text-decoration: none;
      border-radius: 999px;
      padding: 6px 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }
    .nav-link-back span { font-size: 14px; }
    .nav-link-back:hover {
      border-color: var(--border-strong);
      color: var(--accent);
      transform: translateY(-1px);
    }

    /* SECTION HEADING */
    .section-heading {
      margin-bottom: 20px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .section-title {
      font-family: var(--font-display);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 12px;
      color: var(--text-muted);
    }
    .section-sub {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* MASONRY GALLERY */
    .gallery {
      columns: 3;
      column-gap: 14px;
    }
    .gallery-item {
      break-inside: avoid;
      margin-bottom: 14px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border-subtle);
      background: var(--card-bg);
      cursor: zoom-in;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .gallery-item:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    }
    .gallery-item img {
      width: 100%;
      display: block;
    }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      backdrop-filter: blur(8px);
    }
    .lightbox.open { display: flex; }
    .lightbox-inner {
      max-width: 92vw;
      max-height: 92vh;
      position: relative;
    }
    .lightbox-inner img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 12px;
      display: block;
    }
    .lightbox-close {
      position: absolute;
      top: -40px;
      right: 0;
      padding: 6px 14px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.5);
      background: rgba(15,23,42,0.9);
      color: var(--text-secondary);
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .lightbox-close:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      padding: 12px 16px;
      font-size: 20px;
      border: 1px solid rgba(148,163,184,0.3);
      border-radius: 999px;
      background: rgba(15,23,42,0.8);
      color: var(--text-secondary);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      backdrop-filter: blur(8px);
    }
    .lightbox-nav:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .lightbox-prev { left: -60px; }
    .lightbox-next { right: -60px; }
    .lightbox-counter {
      text-align: center;
      margin-top: 12px;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }

    /* FOOTER */
    footer {
      margin-top: 40px;
      padding-top: 18px;
      border-top: 1px solid rgba(15,23,42,0.9);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }

    /* RESPONSIVE */
    @media (max-width: 840px) {
      .gallery { columns: 2; }
      .lightbox-prev { left: 8px; }
      .lightbox-next { right: 8px; }
    }
    @media (max-width: 520px) {
      .gallery { columns: 1; }
    }
  </style>

      <button class="lightbox-close" type="button">Close &#10005;</button>
      <button class="lightbox-nav lightbox-prev" type="button">&#8592;</button>
      <img src="" alt="">
      <button class="lightbox-nav lightbox-next" type="button">&#8594;</button>
      <div class="lightbox-counter"></div>
    </div>
  </div>

  <script>
    (function () {
      const lightbox = document.getElementById('lightbox');
      if (!lightbox) return;
      const lbImg = lightbox.querySelector('img');
      const lbCounter = lightbox.querySelector('.lightbox-counter');
      const items = Array.from(document.querySelectorAll('.gallery-item img'));
      let current = 0;

      function show(idx) {
        current = (idx + items.length) % items.length;
        lbImg.src = items[current].src;
        lbImg.alt = items[current].alt;
        lbCounter.textContent = (current + 1) + ' / ' + items.length;
        lightbox.classList.add('open');
      }

      items.forEach(function (img, i) {
        img.addEventListener('click', function () { show(i); });
      });

      lightbox.querySelector('.lightbox-close').addEventListener('click', function () {
        lightbox.classList.remove('open');
      });
      lightbox.querySelector('.lightbox-prev').addEventListener('click', function () {
        show(current - 1);
      });
      lightbox.querySelector('.lightbox-next').addEventListener('click', function () {
        show(current + 1);
      });
      lightbox.addEventListener('click', function (e) {
        if (e.target === lightbox) lightbox.classList.remove('open');
      });
      window.addEventListener('keydown', function (e) {
        if (!lightbox.classList.contains('open')) return;
        if (e.key === 'Escape') lightbox.classList.remove('open');
        if (e.key === 'ArrowLeft') show(current - 1);
        if (e.key === 'ArrowRight') show(current + 1);
      });
    })();
  </script>
